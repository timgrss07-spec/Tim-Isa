<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tim & Isa · 11. Juli 2026 · Sitzplan</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --cream:   #faf7f2;
      --beige:   #ede8df;
      --beige2:  #ddd5c6;
      --sand:    #c8bba8;
      --brown:   #8a7560;
      --dark:    #3d2e22;
      --gold:    #b89a6a;
      --white:   #ffffff;
      --highlight: #f3ede2;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--cream);
      color: var(--dark);
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      text-align: center;
      padding: 4rem 1.5rem 2.5rem;
      background: var(--white);
      border-bottom: 1px solid var(--beige2);
      position: relative;
    }
    header::after {
      content: '';
      display: block;
      width: 60px;
      height: 1px;
      background: var(--gold);
      margin: 1.5rem auto 0;
    }
    .eyebrow {
      font-family: 'Jost', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1rem;
    }
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.4rem, 6vw, 4rem);
      font-weight: 300;
      font-style: italic;
      line-height: 1.1;
      color: var(--dark);
    }
    .date {
      margin-top: 0.6rem;
      font-size: 0.85rem;
      letter-spacing: 0.15em;
      color: var(--brown);
    }

    /* ── Search ── */
    .search-wrap {
      max-width: 480px;
      margin: 2.5rem auto;
      padding: 0 1.5rem;
    }
    .search-label {
      display: block;
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--brown);
      margin-bottom: 0.6rem;
    }
    .search-box {
      display: flex;
      align-items: center;
      background: var(--white);
      border: 1px solid var(--beige2);
      border-radius: 2px;
      overflow: hidden;
    }
    .search-box input {
      flex: 1;
      padding: 0.85rem 1rem;
      border: none;
      outline: none;
      font-family: 'Jost', sans-serif;
      font-size: 0.95rem;
      font-weight: 300;
      color: var(--dark);
      background: transparent;
    }
    .search-box input::placeholder { color: var(--sand); }
    .clear-btn {
      background: none;
      border: none;
      padding: 0 1rem;
      cursor: pointer;
      color: var(--sand);
      font-size: 1.1rem;
      line-height: 1;
      display: none;
    }
    .clear-btn.visible { display: block; }

    .result-banner {
      text-align: center;
      font-size: 0.85rem;
      color: var(--brown);
      margin-top: 0.7rem;
      min-height: 1.2em;
      letter-spacing: 0.05em;
    }
    .result-banner strong {
      color: var(--dark);
      font-weight: 500;
    }

    /* ── Tables grid ── */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 1.5rem 5rem;
    }

    .section-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
      font-weight: 400;
      font-style: italic;
      letter-spacing: 0.08em;
      color: var(--sand);
      text-align: center;
      margin: 2.5rem 0 1.5rem;
    }

    .tables-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1.25rem;
    }

    .table-card {
      background: var(--white);
      border: 1px solid var(--beige2);
      border-radius: 3px;
      overflow: hidden;
      transition: box-shadow 0.2s;
    }
    .table-card:hover {
      box-shadow: 0 4px 20px rgba(61,46,34,0.07);
    }
    .table-card.dimmed {
      opacity: 0.35;
    }
    .table-card.highlighted {
      border-color: var(--gold);
      box-shadow: 0 4px 20px rgba(184,154,106,0.18);
    }

    .table-header {
      background: var(--beige);
      padding: 0.85rem 1.1rem;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      border-bottom: 1px solid var(--beige2);
    }
    .table-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.25rem;
      font-weight: 400;
      color: var(--dark);
    }
    .table-count {
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--brown);
    }

    .guest-list {
      list-style: none;
      padding: 0.5rem 0;
    }
    .guest-item {
      padding: 0.45rem 1.1rem;
      font-size: 0.88rem;
      line-height: 1.35;
      color: var(--dark);
      border-bottom: 1px solid var(--cream);
      transition: background 0.15s;
    }
    .guest-item:last-child { border-bottom: none; }
    .guest-item.match {
      background: var(--highlight);
      font-weight: 500;
    }
    .guest-item.frei {
      color: var(--sand);
      font-style: italic;
    }

    /* ── Couple highlight ── */
    .guest-item.couple {
      color: var(--gold);
      font-weight: 500;
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 2rem 1.5rem;
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--sand);
      border-top: 1px solid var(--beige2);
    }
    footer span { color: var(--gold); }
  </style>
</head>
<body>

<header>
  <p class="eyebrow">Sitzplan · Blossom</p>
  <h1>Tim &amp; Isa</h1>
  <p class="date">11. Juli 2026</p>
</header>

<div class="search-wrap">
  <label class="search-label" for="search">Namen suchen</label>
  <div class="search-box">
    <input id="search" type="text" placeholder="z.B. Muster …" autocomplete="off" />
    <button class="clear-btn" id="clearBtn" aria-label="Suche löschen">✕</button>
  </div>
  <p class="result-banner" id="resultBanner"></p>
</div>

<main>
  <div class="tables-grid" id="tablesGrid"></div>
</main>

<footer>
  Herzlichen Glückwunsch &nbsp;<span>♡</span>&nbsp; Wir freuen uns auf euch
</footer>

<script>
  const tables = [
    {
      name: "Tisch 1",
      guests: ["Hoang Luong Duc", "Sina Ziegler", "Justus Lemp", "Hannah Meister", "Finn Pietsch", "Lauritz Heller", "Jana"]
    },
    {
      name: "Tisch 2",
      guests: ["Steffen Henschel", "Leni Fröhlich", "Maxim Fröhlich", "Lahja Zoé", "Bastian Bock", "— frei —", "Martin Fröhlich", "Larissa Fröhlich", "Nico Kaczmarczyk", "Alina Bock"]
    },
    {
      name: "Tisch 3",
      guests: ["Tarek Fiebrandt", "Lynn Buttkus", "Greta Thürnau", "Max Peleikis", "Patricia", "Max Schuldt", "Nele Walter", "Torge Ramm", "Jan-Philipp Scheibe", "Anneke Laß", "Mats Timm", "Wencke Bock"]
    },
    {
      name: "Tisch 4",
      guests: ["Heike Thürnau", "Dirk Groß", "Maren Gottschlich", "Sven Thürnau", "Petra Groß", "Stefan Gottschlich"]
    },
    {
      name: "Tisch 5 · Brautpaar",
      guests: ["Jan Groß-Ziegler", "Moritz Gottschlich", "Tim", "Isa", "Sabine Gelhar", "Jan Gelhar", "Evy Groß-Ziegler", "Tara Spindler", "Niklas Warnecke", "Laura Warnecke", "Moritz Supinski", "Elli Bothe"],
      couple: ["Tim", "Isa"]
    },
    {
      name: "Tisch 6",
      guests: ["Nicole Pahl", "Christian Schäfer", "Oma Moni", "Kerstin Drömann", "Holger Warnecke", "Stephan Pahl", "Martina Schäfer", "Oma Anne", "Johannes Drömann", "Babette Lindacher-Weis"]
    },
    {
      name: "Tisch 7",
      guests: ["Louisa Schlüter", "Lena Haß", "Leoni Pries", "Tabea Linnemann", "Helen Heindorf"]
    },
    {
      name: "Tisch 8",
      guests: ["Pia Matzen", "Nick Rodacker", "Felix Ilgenstein", "Olli", "Paulina Gosch", "Laura Mansberg", "Marit Kusche"]
    },
    {
      name: "Tisch 9",
      guests: ["Yvonn Biemann", "Sonja Roelke", "Jörg Groß", "Mariatta Waldeck", "Rasmus Waldeck", "Maike Waldeck", "Tina Haut", "Geli Matthiesen", "Andrea Pahl", "Dominik Biemann", "Marc Roelke", "Regina Groß", "Finn Waldeck", "Christin", "Burkhard Waldeck", "Wolfgang Haut", "Jörg Matthiesen", "Michael Pahl"]
    },
    {
      name: "Tisch 10",
      guests: ["Oke Pahl", "Mads Pahl", "Finn Matthiesen", "Anna Maria Haut", "Nele Kittelmann", "Bent Matthiesen", "Lina Matthiesen", "Juliane Haut"]
    }
  ];

  const grid = document.getElementById('tablesGrid');
  const searchInput = document.getElementById('search');
  const clearBtn = document.getElementById('clearBtn');
  const resultBanner = document.getElementById('resultBanner');

  function renderTables(query) {
    query = query.trim().toLowerCase();
    grid.innerHTML = '';
    let totalMatches = 0;
    let matchTableName = '';

    tables.forEach(t => {
      const card = document.createElement('div');
      card.className = 'table-card';

      // header
      const header = document.createElement('div');
      header.className = 'table-header';
      const nameEl = document.createElement('span');
      nameEl.className = 'table-name';
      nameEl.textContent = t.name;
      const countEl = document.createElement('span');
      countEl.className = 'table-count';
      countEl.textContent = t.guests.filter(g => !g.startsWith('—')).length + ' Gäste';
      header.appendChild(nameEl);
      header.appendChild(countEl);
      card.appendChild(header);

      const ul = document.createElement('ul');
      ul.className = 'guest-list';

      let hasMatch = false;
      t.guests.forEach(g => {
        const li = document.createElement('li');
        const isCouple = t.couple && t.couple.some(c => g === c);
        const isFrei = g.startsWith('—');
        li.className = 'guest-item' + (isFrei ? ' frei' : '') + (isCouple ? ' couple' : '');
        li.textContent = g;

        if (query && !isFrei) {
          const normalized = g.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
          const queryNorm = query.normalize('NFD').replace(/[\u0300-\u036f]/g, '');
          if (normalized.includes(queryNorm)) {
            li.classList.add('match');
            hasMatch = true;
            totalMatches++;
            matchTableName = t.name;
          }
        }
        ul.appendChild(li);
      });

      card.appendChild(ul);

      if (query) {
        card.classList.add(hasMatch ? 'highlighted' : 'dimmed');
      }

      grid.appendChild(card);
    });

    // banner
    if (!query) {
      resultBanner.innerHTML = '';
    } else if (totalMatches === 0) {
      resultBanner.innerHTML = 'Kein Gast gefunden.';
    } else if (totalMatches === 1) {
      resultBanner.innerHTML = `Gefunden bei <strong>${matchTableName}</strong>`;
    } else {
      resultBanner.innerHTML = `${totalMatches} Treffer gefunden`;
    }
  }

  searchInput.addEventListener('input', () => {
    const q = searchInput.value;
    clearBtn.classList.toggle('visible', q.length > 0);
    renderTables(q);
  });

  clearBtn.addEventListener('click', () => {
    searchInput.value = '';
    clearBtn.classList.remove('visible');
    resultBanner.innerHTML = '';
    renderTables('');
    searchInput.focus();
  });

  renderTables('');
</script>
</body>
</html>
